name: Deploy to Firebase

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Postman collection matches routes
        run: npm run postman:check

      - name: Write Firebase service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT secret."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      # Gen 2 functions run on Cloud Run. Firebase CLI reads this file at deploy time and sets
      # runtime env vars on the service (your local .env is gitignored and not on the runner).
      - name: Write function runtime environment for deploy
        env:
          STORAGE_BUCKET: ${{ vars.STORAGE_BUCKET }}
        run: |
          if [ -z "$STORAGE_BUCKET" ]; then
            echo "Missing repository variable STORAGE_BUCKET."
            echo "Add it under: Settings → Secrets and variables → Actions → Variables"
            echo "Value: your default Storage bucket id (Firebase → Storage), e.g. project-id.appspot.com"
            exit 1
          fi
          printf 'STORAGE_BUCKET=%s\n' "$STORAGE_BUCKET" > .env

      - name: Deploy functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools deploy --non-interactive --only functions
